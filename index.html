<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Dashboard Statut - Cursor Clicker</title>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 40px auto; background: #f4f4f9; padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .row { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #eee; }
        .online { color: #27ae60; font-weight: bold; } 
        .maint { color: #f39c12; font-weight: bold; } 
        .offline { color: #c0392b; font-weight: bold; }
        
        /* Bouton Admin en haut à droite */
        #admin-btn { position: fixed; top: 20px; right: 20px; background: #e74c3c; color: white; border: none; padding: 10px 15px; border-radius: 5px; cursor: pointer; }
        
        /* Panneau Admin en popup */
        #admin-panel { position: fixed; top: 60px; right: 20px; background: #fff3cd; padding: 20px; border-radius: 12px; display: none; box-shadow: 0 4px 10px rgba(0,0,0,0.2); width: 250px; z-index: 1000; }
    </style>
</head>
<body>

<button id="admin-btn" onclick="toggleAdmin()">Admin</button>

<div class="card">
    <h1>Statut des systèmes</h1>
    <div id="systems"></div>
</div>

<div id="admin-panel">
    <h3>Panneau Admin</h3>
    <input type="password" id="pass" placeholder="Mot de passe">
    <button onclick="login()">Se connecter</button>
    <div id="admin-controls" style="margin-top:15px"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
    import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCBruq8n-X4VmyNkb8Xs8Pv8-V4YctW7r4",
        authDomain: "cursor-clicker-d25da.firebaseapp.com",
        projectId: "cursor-clicker-d25da",
        storageBucket: "cursor-clicker-d25da.firebasestorage.app",
        messagingSenderId: "583222885338",
        appId: "1:583222885338:web:0f216512afd80b502f1ee3",
        databaseURL: "https://cursor-clicker-d25da-default-rtdb.europe-west1.firebasedatabase.app"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const systems = ['Serveurs', 'Boutique', 'Rebirth', 'Sauvegarde', 'Parrainage', 'Matchmaking', 'Event'];

    systems.forEach(s => {
        document.getElementById('systems').innerHTML += `<div class="row"><span>${s}</span><span id="${s}" class="offline">Chargement...</span></div>`;
        onValue(ref(db, 'status/' + s), (snap) => {
            const val = snap.val();
            const el = document.getElementById(s);
            if (el) {
                el.innerText = val || "Hors service";
                el.className = val === 'Opérationnel' ? 'online' : (val === 'Maintenance' ? 'maint' : 'offline');
            }
        });
    });

    window.toggleAdmin = () => {
        const p = document.getElementById('admin-panel');
        p.style.display = p.style.display === 'block' ? 'none' : 'block';
    };

    window.login = () => {
        if(document.getElementById('pass').value === "Sacha0409@@") {
            document.getElementById('admin-controls').innerHTML = systems.map(s => 
                `<div style="margin-bottom:8px">${s}: <select onchange="update('${s}', this.value)">
                    <option value="Opérationnel">Opérationnel</option>
                    <option value="Maintenance">Maintenance</option>
                    <option value="Hors service">Hors service</option>
                </select></div>`
            ).join('');
        } else {
            alert("Mot de passe incorrect !");
        }
    };

    window.update = (s, val) => set(ref(db, 'status/' + s), val);
</script>
</body>
</html>
